<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Razorpay Test</title>
</head>
<body>

<h2>Razorpay Standalone Test</h2>

<button onclick="pay()">Pay ₹100</button>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
async function pay() {

    const token = localStorage.getItem("token");

    const orderRes = await fetch(
        "https://mony.bazhilgroups.in/api/payment/create-order",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + token
            }
        }
    );

    const order = await orderRes.json();

    console.log(order);

    const options = {

        key: "rzp_live_T4ZJrIbGj17pJK",

        amount: order.amount,

        currency: order.currency,

        order_id: order.id,

        name: "Royal Matrimony",

        description: "Premium Plan",

        handler: async function(response){

            console.log(response);

            const verify = await fetch(
                "https://mony.bazhilgroups.in/api/payment/verify",
                {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json",
                        Authorization:"Bearer "+token
                    },
                    body:JSON.stringify(response)
                }
            );

            console.log(await verify.json());
        }
    };

    console.log(options);

    const rzp = new Razorpay(options);

    rzp.on("payment.failed", function(e){
        console.log(e);
    });

    rzp.open();
}
</script>

</body>
</html>
